meta:
  owner: OWNER
  last_verified_by: ""
  last_verified_date: ""
  source: ""
  status: template
  mode: live

entry_band:
  min_ask:            # your lowest entry price
  max_ask:            # your highest entry price
  fill_floor:         # reject fills below this

filters:
  min_move_bps:       # required |move| (bps), applied as abs()
  weekend_min_move_bps: 0
  min_book_depth: 50
  min_confirms: 2
  chop_filter: false
  chop_max_flips: 4
  chop_lookback: 90
  coins: [BTC, ETH]
  durations: ["5m", "15m"]

fire_timing:
  snipe_window_secs: 12
  snipe_window_15m: 12
  min_fill_secs: 2
  late_fire_secs: 0

sizing:
  base_size:          # base stake $
  dynamic_size: true
  paroli_enabled: true
  paroli_ladder: []   # e.g. [8, 12, 15]
  paroli_mult: 1.5
  paroli_steps: 3
  paroli_5m_max_step: 1
  max_per_market:     # hard cap $

guardrails:
  max_loss_streak:    # stop after N consecutive losses
  daily_loss_limit:   # halt for day at this $ loss
  min_balance: 150
  rolling_24h_limit: 0
  max_open_positions: 5
  auto_scratch: true
  scratch_max_slip: 0.15

schedule_gate:
  trading_hours: []   # UTC hours; empty = all
  active_days: []     # empty = all days
  blackout_start: 21
  blackout_end: 23

skips:
  skip_eth_up: false
  skip_btc_up: false
  eth_skip_15m: false
  btc_skip_5m: false
